name: AutoHealOps CI/CD Pipeline - Pipeline 2

on:
  push:
    branches:
      - main
      - pipeline-cicd
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Run Pytest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run pytest
        run: pytest app/tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t autoheaops-app:latest ./app

      - name: Confirm image exists
        run: docker images autoheaops-app:latest

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild Docker image for scanning
        run: docker build -t autoheaops-app:latest ./app

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: autoheaops-app:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          output: trivy-results.txt

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.txt