version: '3.8'

services:
  # Flask application
  app:
    build: ./app
    container_name: autoheaops-app
    ports:
      - "5000:5000"
    networks:
      - autoheaops-net
    restart: unless-stopped
    environment:
      - FLASK_ENV=production

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: autoheaops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - autoheaops-net
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: autoheaops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_ADMIN_USER=admin
    networks:
      - autoheaops-net
    restart: unless-stopped

networks:
  autoheaops-net:
    driver: bridge